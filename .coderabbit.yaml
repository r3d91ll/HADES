# CodeRabbit Configuration for Information Reconstructionism
version: "1"
language: "en-US"
early_access: false

# Review Settings
reviews:
  # Request incremental reviews on every push
  request_changes_workflow: true
  
  # High-level summary of changes
  high_level_summary: true
  
  # Generate poems or creative content (set to false for professional reviews)
  poem: false
  
  # Enable review status checks
  review_status: true
  
  # Collapse generated summary details by default
  collapse_walkthrough: false
  
  # Automatically approve dependency updates
  auto_review:
    enabled: true
    drafts: false
  
  # Path-specific instructions
  path_instructions:
    - path: "processors/arxiv/**"
      instructions: |
        - Check for proper GPU resource management (CUDA_VISIBLE_DEVICES)
        - Verify ArangoDB connection patterns and atomic transactions
        - Ensure proper error handling for arXiv data processing
        - Validate batch processing efficiency and memory limits
        - Check for proper checkpoint and recovery mechanisms
        - Ensure PDF processing integrity and late chunking implementation
        - Verify Jina v4 embeddings (2048-dim) are used correctly
        
    - path: "core/**"
      instructions: |
        - Verify Jina v4 embedding implementation with late chunking
        - Check for proper GPU memory management and batch sizing
        - Ensure efficient vector operations and similarity calculations
        - Validate 2048-dimensional vector space implementation
        - Check for proper async/await patterns in embedding pipeline
        - Ensure proper error propagation and logging
        
    - path: "scripts/**"
      instructions: |
        - Ensure proper command-line argument handling
        - Check for proper database connection management
        - Verify on-demand PDF processing workflow
        - Validate monitoring and status reporting utilities
        - Check for proper error handling and recovery
        - Ensure scripts are idempotent where appropriate
        
    - path: "mcp_server/**"
      instructions: |
        - Verify MCP protocol compliance
        - Check for proper async tool implementation
        - Ensure lazy-loading PDF strategy is correctly implemented
        - Validate progressive document processing workflow
        - Check for proper error handling in tool functions
        - Ensure proper ArangoDB transaction handling
        
    - path: "pipelines/**"
      instructions: |
        - Check for proper multi-GPU coordination
        - Verify pipeline orchestration and error recovery
        - Ensure proper checkpoint management
        - Validate memory-efficient batch processing
        - Check for proper logging and monitoring integration
        
    - path: "monitoring/**"
      instructions: |
        - Ensure proper metrics collection and reporting
        - Check for resource usage tracking (GPU, memory)
        - Verify log aggregation and analysis
        - Validate alert thresholds and notifications
        - Check for proper dashboard configurations
        
    - path: "utils/**"
      instructions: |
        - Verify utility functions are pure and well-tested
        - Check for proper error handling and edge cases
        - Ensure functions are properly documented
        - Validate performance for critical utilities
        - Check for proper type hints and validation
        
    - path: "tests/**"
      instructions: |
        - Ensure comprehensive test coverage (>85%)
        - Check for proper mocking of external dependencies
        - Verify test isolation and cleanup
        - Validate both unit and integration tests
        - Check for proper fixture usage and reusability
        
    - path: "*.py"
      instructions: |
        - Follow PEP 8 style guidelines
        - Use type hints where appropriate
        - Ensure proper docstrings for public functions
        - Check for proper exception handling
        - Verify no hardcoded paths or credentials
  
  # File patterns to exclude from reviews
  path_filters:
    - "**/*.lock"
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/venv/**"
    - "**/.mypy_cache/**"
    - "**/.pytest_cache/**"
    - "**/logs/**"
    - "**/data/**"
    - "**/*.db"
    - "**/checkpoints/**"
    - "**/*.done"
    - "**/*.log"
    - "**/models/*.pth"
    - "**/*.mdb"

# Note: The following configurations from the original file are not supported by CodeRabbit:
# - issue_handling: Use GitHub Actions or CI/CD for issue creation
# - review_checklist: Implement in CI/CD pipeline
# - batch_processing: Not a valid CodeRabbit configuration
# - quality_gates: Use external quality tools (SonarQube, etc.)
#
# For quality gates and issue management, consider using:
# - GitHub Actions for automated issue creation
# - Pre-commit hooks for code quality checks
# - CI/CD pipelines for coverage and complexity metrics