---
# Data Ingestion Pipeline Configuration
# Controls the complete pipeline from document processing to storage

# Pipeline metadata
pipeline:
  name: "hades_data_ingestion"
  version: "1.0.0"
  description: "Complete data ingestion pipeline for HADES-PathRAG"

# Global pipeline settings
global:
  batch_size: 100                    # Default batch size for all stages
  enable_validation: true            # Enable validation at each stage
  continue_on_errors: true           # Continue processing other files if one fails
  max_parallel_workers: 4            # Maximum parallel workers for stages that support it
  timeout_seconds: 3600              # Pipeline timeout (1 hour)

# Stage 1: Document Processing Configuration
docproc:
  # Supported file types and their processors
  supported_formats:
    - ".pdf"
    - ".py" 
    - ".md"
    - ".txt"
    - ".json"
    - ".yaml"
  
  # Processor-specific settings
  processors:
    pdf:
      adapter: "docling"             # Use Docling for PDF processing
      extract_tables: true
      extract_images: false
      ocr_enabled: true
    
    python:
      adapter: "python_ast"          # Use AST parser for Python files
      extract_docstrings: true
      extract_comments: true
      include_imports: true
    
    markdown:
      adapter: "markdown"
      preserve_structure: true
      extract_code_blocks: true
    
    text:
      adapter: "text"
      encoding: "utf-8"
      max_size_mb: 10
  
  # Processing settings
  batch_processing: true
  max_file_size_mb: 50               # Skip files larger than this
  validate_content: true             # Validate extracted content
  preserve_metadata: true            # Keep file metadata

# Stage 2: Chunking Configuration
chunking:
  # Default chunking strategy
  default_strategy: "paragraph"
  
  # Strategy-specific settings
  strategies:
    paragraph:
      max_chunk_size: 1000           # Maximum characters per chunk
      min_chunk_size: 50             # Minimum characters per chunk
      overlap: 100                   # Character overlap between chunks
      preserve_sentences: true       # Don't break sentences
    
    ast:
      target_size: 800               # Target characters for AST chunks
      include_context: true          # Include surrounding context
      preserve_structure: true       # Maintain code structure
    
    semantic:
      model: "modernbert"            # Model for semantic chunking
      similarity_threshold: 0.7      # Similarity threshold for grouping
      max_chunk_size: 1200
  
  # Chunker implementation
  chunker_type: "cpu"                # "cpu" or "gpu" 
  enable_parallel: false             # Parallel chunking (experimental)
  
  # Quality settings
  validate_chunks: true              # Validate chunk quality
  min_meaningful_content: 0.3        # Minimum ratio of meaningful content
  filter_short_chunks: true          # Remove very short chunks

# Stage 3: Embedding Configuration  
embedding:
  # Primary embedding adapter
  adapter_name: "modernbert"         # "cpu", "vllm", "ollama", "modernbert"
  
  # Model settings
  model:
    name: "answerdotai/ModernBERT-base"
    dimension: 768                   # Embedding dimension
    max_sequence_length: 8192        # Maximum input length
  
  # Processing settings
  batch_size: 32                     # Embedding batch size
  normalize_embeddings: true         # L2 normalize embeddings
  cache_embeddings: true             # Cache computed embeddings
  
  # Quality and validation
  validate_embeddings: true          # Validate embedding quality
  check_for_nans: true              # Check for NaN values
  embedding_quality_threshold: 0.1   # Minimum embedding norm
  
  # Fallback settings
  fallback_adapter: "cpu"           # Fallback if primary fails
  retry_failed: 3                   # Retry failed embeddings

# Stage 4: ISNE Configuration
isne:
  # Model architecture
  model:
    embedding_dim: 768               # Input embedding dimension (from Stage 3)
    hidden_dim: 128                  # Hidden layer dimension
    output_dim: 64                   # Output embedding dimension
    num_layers: 2                    # Number of ISNE layers
    dropout: 0.1                     # Dropout rate
    activation: "relu"               # Activation function
  
  # Training settings (for adaptive training)
  training:
    learning_rate: 0.001
    batch_size: 32
    max_epochs: 50
    early_stopping: true
    patience: 10
    validation_split: 0.2
  
  # Graph construction
  graph:
    similarity_threshold: 0.3        # Minimum similarity for edges
    max_neighbors: 10                # Maximum neighbors per node
    edge_types:
      - "semantic"                   # Semantic similarity edges
      - "sequential"                 # Sequential document order
      - "cross_document"             # Cross-document relationships
  
  # Processing settings
  enable_training: false             # Whether to train/retrain model
  load_pretrained: true              # Load existing trained model
  model_path: "./models/isne_model.pt"  # Path to trained model
  
  # Quality settings
  validate_graph: true               # Validate graph structure
  min_graph_density: 0.001           # Minimum acceptable graph density
  max_graph_density: 0.01           # Maximum acceptable graph density

# Stage 5: Storage Configuration
storage:
  # Database settings
  database:
    type: "arangodb"                 # Database type
    name: "hades_pathrag"            # Database name
    
  # Connection settings (loaded from database_config.yaml)
  connection:
    host: "localhost"
    port: 8529
    username: "root"
    password: ""                     # Set via environment variable
    
  # Collections
  collections:
    documents: "documents"           # Document collection name
    chunks: "chunks"                 # Chunk collection name  
    relationships: "chunk_relationships"  # Edge collection name
  
  # Storage mode
  mode: "create"                     # "create", "append", "upsert"
  overwrite: false                   # Overwrite existing database
  
  # Performance settings
  batch_size: 100                    # Insert batch size
  enable_transactions: true          # Use transactions for consistency
  create_indices: true               # Create search indices
  
  # Index settings
  indices:
    vector_indices: true             # Create vector indices for embeddings
    text_indices: true               # Create full-text search indices
    metadata_indices: true           # Create metadata indices
    
  # Data handling
  duplicate_handling: "skip"         # "skip", "update", "error"
  validate_before_insert: true       # Validate data before insertion
  chunk_relationship_validation: true  # Validate chunk relationships

# Debug and monitoring
debug:
  enabled: false                     # Enable debug mode
  save_intermediate: false           # Save outputs at each stage
  output_directory: "./debug-output" # Debug output directory
  log_level: "INFO"                  # DEBUG, INFO, WARNING, ERROR
  
# Monitoring and alerts
monitoring:
  enable_alerts: true                # Enable alerting system
  alert_thresholds:
    error_rate: 0.1                  # Alert if >10% error rate
    processing_time: 3600            # Alert if >1 hour processing time
    memory_usage: 0.8                # Alert if >80% memory usage
  
  # Metrics collection
  collect_metrics: true
  metrics_interval: 60               # Collect metrics every 60 seconds
  save_metrics: true
  metrics_file: "./metrics/pipeline_metrics.json"

# Performance optimization
performance:
  # Memory management
  max_memory_gb: 16                  # Maximum memory usage
  garbage_collection_interval: 100   # Run GC every N documents
  
  # Parallel processing
  enable_parallel_stages: false      # Enable parallel stage execution
  max_concurrent_files: 4            # Max files processed concurrently
  
  # Caching
  enable_caching: true               # Enable various caches
  cache_directory: "./cache"         # Cache directory
  cache_size_mb: 1024               # Maximum cache size
  
  # Resource limits
  cpu_limit: null                    # CPU core limit (null = no limit)
  gpu_memory_fraction: 0.8          # GPU memory fraction to use

# Error handling and recovery
error_handling:
  # Retry configuration
  max_retries: 3                     # Maximum retries per operation
  retry_delay: 5                     # Delay between retries (seconds)
  exponential_backoff: true          # Use exponential backoff
  
  # Recovery strategies
  continue_on_stage_failure: true    # Continue if a stage fails
  save_partial_results: true         # Save results from successful stages
  recovery_checkpoint_interval: 50   # Save progress every N files
  
  # Validation
  strict_validation: false           # Strict validation mode
  validation_on_error: true          # Run extra validation on errors
  
# Output formatting
output:
  # Result formatting
  format: "json"                     # Output format
  include_metadata: true             # Include processing metadata
  include_statistics: true           # Include processing statistics
  include_timing: true               # Include timing information
  
  # File outputs
  save_results: true                 # Save results to file
  results_directory: "./results"     # Results output directory
  compress_outputs: false            # Compress output files
  
  # Status reporting
  progress_reporting: true           # Enable progress reporting
  progress_interval: 10              # Report progress every N files
  final_report: true                 # Generate final processing report