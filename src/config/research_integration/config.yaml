research_integration:
  # Discovery settings
  discovery:
    sources:
      - name: "arxiv"
        categories: ["cs.IR", "cs.CL", "cs.AI", "cs.LG", "cs.SE"]
        keywords:
          - "retrieval augmented generation"
          - "graph neural networks"
          - "code generation"
          - "knowledge graphs"
          - "multi-modal retrieval"
          - "path-based reasoning"
          - "semantic code search"
        update_frequency: "hourly"
        
      - name: "semantic_scholar"
        fields: ["computer science"]
        min_citations: 0  # Include very recent papers
        
      - name: "github"
        topics: ["rag", "knowledge-graph", "code-generation"]
        stars_threshold: 50
    
    # How far back to look for papers
    lookback_days: 7
    
  # Analysis settings
  analysis:
    # Model for paper analysis
    analyzer_model: "gpt-4"
    
    # Extraction prompts
    extraction_templates:
      algorithms: |
        Extract all algorithms, techniques, and methods described in this paper.
        Focus on implementation details and pseudocode.
        
      performance: |
        Extract all performance claims, benchmarks, and improvements.
        Include specific metrics and baselines.
        
      implementation: |
        Extract implementation details, architecture descriptions, and 
        system designs that could be applied to our codebase.
    
  # Code mapping settings
  mapping:
    # Minimum relevance score to consider a mapping
    relevance_threshold: 0.7
    
    # Types of connections to identify
    connection_types:
      - "algorithm_implementation"
      - "optimization_opportunity"
      - "architecture_pattern"
      - "benchmark_target"
      - "integration_point"
    
  # Improvement generation settings
  generation:
    # Priority calculation weights
    priority_weights:
      relevance: 0.4
      impact: 0.3
      feasibility: 0.2
      novelty: 0.1
    
    # Implementation templates
    templates:
      algorithm_integration: |
        Integrate the {algorithm} technique from {paper} into {module}.
        This should improve {metric} by approximately {improvement}%.
        
      optimization: |
        Apply {optimization} to {module} based on insights from {paper}.
        Expected impact: {impact_description}
    
  # Validation settings
  validation:
    # Required test coverage
    min_test_coverage: 0.85
    
    # Performance regression threshold
    perf_regression_threshold: -0.05  # Allow 5% regression max
    
    # Code quality checks
    quality_checks:
      - "mypy"
      - "black"
      - "isort"
      - "flake8"
    
  # Implementation settings
  implementation:
    # Auto-implementation settings
    auto_implement: false  # Start with manual review
    
    # Confidence threshold for auto-implementation
    confidence_threshold: 0.9
    
    # Maximum changes per cycle
    max_changes_per_cycle: 3
    
    # Rollback settings
    enable_rollback: true
    rollback_on_test_failure: true
    
  # Knowledge graph settings
  graph_integration:
    # Edge types for research-code connections
    edge_types:
      research_paper_to_concept:
        weight: 0.8
        type: "contains"
        
      concept_to_code:
        weight: 0.9
        type: "implements"
        
      paper_to_improvement:
        weight: 0.7
        type: "suggests"
        
      improvement_to_code:
        weight: 0.85
        type: "modifies"
    
    # Node enrichment
    enrich_nodes:
      research_papers: true
      code_modules: true
      improvements: true
    
  # Monitoring and metrics
  monitoring:
    # Track improvement metrics
    metrics:
      - "papers_processed"
      - "improvements_generated"
      - "improvements_implemented"
      - "performance_gains"
      - "test_coverage_changes"
      - "code_quality_scores"
    
    # Alerting
    alerts:
      on_new_paper: true
      on_improvement_generated: true
      on_implementation_complete: true
      on_validation_failure: true
    
  # Experimental features
  experimental:
    # Use LLM to generate code improvements
    llm_code_generation: true
    
    # Automatic A/B testing of improvements
    auto_ab_testing: false
    
    # Self-modifying code capabilities
    self_modification: false  # Requires explicit enabling